<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات - متجر باريس للأثاث</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- الهيدر (Header) -->
    <header>
        <div class="container">
            <nav class="navbar">
                <div class="logo">متجر باريس للأثاث</div>
                <div class="nav-links">
                    <a href="index.html" class="nav-item">الرئيسية</a>
                    <a href="products.html" class="nav-item">المنتجات</a>
                    <a href="cart.html" class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count">0</span>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <section class="container" style="min-height: 60vh; padding: 40px 20px;">
        <h2 class="section-title" style="margin-bottom: 30px;"><i class="fas fa-shopping-basket"></i> سلة التسوق الخاصة بك</h2>

        <div id="cartContent">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>المنتج</th>
                        <th>السعر</th>
                        <th>الكمية</th>
                        <th>المجموع</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="cartItems">
                    <!-- سيتم تحميل عناصر السلة هنا بواسطة JavaScript -->
                </tbody>
            </table>

            <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px;">
                <a href="products.html" class="btn-primary" style="background: #6c757d; color: white;">
                    <i class="fas fa-arrow-right"></i> مواصلة التسوق
                </a>
                
                <div style="background: #fff; padding: 30px; border-radius: 12px; box-shadow: var(--shadow); min-width: 300px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 18px;">
                        <span>إجمالي المنتجات:</span>
                        <span id="cartTotal" style="font-weight: 800; color: #B12704;">0</span>
                        <span style="font-weight: 800; color: #B12704;"> ر.س</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--text-muted);">
                        <span>الشحن:</span>
                        <span>مجاني</span>
                    </div>
                    <hr style="margin-bottom: 20px; border: 0; border-top: 1px solid #eee;">
                    <a href="checkout.html" class="btn-primary" style="width: 100%; text-align: center; display: block;">
                        إتمام عملية الشراء <i class="fas fa-check-circle"></i>
                    </a>
                </div>
            </div>
        </div>

        <div id="emptyCart" style="display: none; text-align: center; padding: 80px 20px; background: white; border-radius: 12px; box-shadow: var(--shadow);">
            <i class="fas fa-shopping-cart" style="font-size: 80px; color: #ddd; margin-bottom: 20px;"></i>
            <h3 style="font-size: 24px; color: #555;">سلة التسوق فارغة حالياً</h3>
            <p style="color: #888; margin-bottom: 30px;">يبدو أنك لم تضف أي منتجات إلى سلتك بعد.</p>
            <a href="products.html" class="btn-primary">ابدأ التسوق الآن</a>
        </div>
    </section>

    <!-- الفوتر (Footer) -->
    <footer>
        <div class="container">
            <div class="copyright">
                &copy; 2026 جميع الحقوق محفوظة لمتجر  باريس للأثاث
            </div>
        </div>
    </footer>

    <!-- ملفات JavaScript -->
    <script src="js/products.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });

        function renderCart() {
            const cart = getCart();
            const cartItems = document.getElementById('cartItems');
            const cartContent = document.getElementById('cartContent');
            const emptyCart = document.getElementById('emptyCart');
            const cartTotal = document.getElementById('cartTotal');

            if (cart.length === 0) {
                cartContent.style.display = 'none';
                emptyCart.style.display = 'block';
                return;
            }

            cartContent.style.display = 'block';
            emptyCart.style.display = 'none';
            cartItems.innerHTML = '';

            let total = 0;

            cart.forEach(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <div style="display: flex; align-items: center; gap: 20px;">
                            <img src="${item.image}" alt="${item.name}" class="cart-item-img" tabindex="0">
                            <div>
                                <div style="font-weight: 700; font-size: 18px; color: var(--primary-color);" tabindex="0">${item.name}</div>
                                <div style="font-size: 13px; color: var(--text-muted);" tabindex="0">${item.category}</div>
                            </div>
                        </div>
                    </td>
                    <td style="font-weight: 700; font-size: 16px;" tabindex="0">${item.price.toLocaleString()} ر.س</td>
                    <td>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)" aria-label="تقليل الكمية" title="تقليل الكمية"><i class="fas fa-minus"></i></button>
                            <span style="min-width: 30px; text-align: center; font-weight: 800; font-size: 16px;" tabindex="0">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)" aria-label="زيادة الكمية" title="زيادة الكمية"><i class="fas fa-plus"></i></button>
                        </div>
                    </td>
                    <td style="font-weight: 900; color: #B12704; font-size: 18px;" tabindex="0">${subtotal.toLocaleString()} ر.س</td>
                    <td>
                        <button onclick="removeFromCart(${item.id})" class="remove-btn" aria-label="حذف المنتج من السلة" title="حذف المنتج">
                            <i class="fas fa-trash-alt" style="font-size: 18px;"></i> <span style="text-decoration: underline;">حذف</span>
                        </button>
                    </td>
                `;
                cartItems.appendChild(row);
            });

            cartTotal.textContent = total.toLocaleString();
        }

        function updateQuantity(productId, change) {
            const cart = getCart();
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    saveCart(cart);
                    renderCart();
                }
            }
        }

        function removeFromCart(productId) {
            let cart = getCart();
            cart = cart.filter(item => item.id !== productId);
            saveCart(cart);
            renderCart();
            showToast('تم حذف المنتج من السلة');
        }
    </script>
</body>
</html>
