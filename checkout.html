<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر باريس للأثاث</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- الهيدر (Header) -->
    <header>
        <div class="container">
            <nav class="navbar">
                <div class="logo">متجر باريس للأثاث</div>
                <div class="nav-links">
                    <a href="index.html" class="nav-item">الرئيسية</a>
                    <a href="products.html" class="nav-item">المنتجات</a>
                    <a href="cart.html" class="cart-icon">
                        🛒 سلة التسوق
                        <span class="cart-count">0</span>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <section class="container">
        <h2 class="section-title">إتمام عملية الشراء</h2>

        <div style="display: grid; grid-template-columns: 1fr 350px; gap: 30px;">
            <!-- نموذج الدفع (Checkout Form) -->
            <div style="background: #fff; padding: 30px; border-radius: 8px; box-shadow: var(--shadow);">
                <h3>معلومات الشحن</h3>
                <br>
                <form id="checkoutForm">
                    <div class="filter-group" style="margin-bottom: 15px;">
                        <label for="fullName">الاسم الكامل:</label>
                        <input type="text" id="fullName" required placeholder="أدخل اسمك الكامل">
                        <span id="nameError" style="color: red; font-size: 12px; display: none;">يرجى إدخال الاسم الكامل</span>
                    </div>

                    <div class="filter-group" style="margin-bottom: 15px;">
                        <label for="phone">رقم الهاتف:</label>
                        <input type="tel" id="phone" required placeholder="مثلاً: 05XXXXXXXX">
                        <span id="phoneError" style="color: red; font-size: 12px; display: none;">يرجى إدخال رقم هاتف صحيح (10 أرقام)</span>
                    </div>

                    <div class="filter-group" style="margin-bottom: 15px;">
                        <label for="address">العنوان بالتفصيل:</label>
                        <textarea id="address" required rows="3" style="padding: 8px; border: 1px solid var(--border-color); border-radius: 4px;"></textarea>
                        <span id="addressError" style="color: red; font-size: 12px; display: none;">يرجى إدخال عنوان الشحن</span>
                    </div>

                    <div class="filter-group" style="margin-bottom: 15px;">
                        <label for="paymentMethod">طريقة الدفع:</label>
                        <select id="paymentMethod">
                            <option value="cod">الدفع عند الاستلام</option>
                            <option value="card">بطاقة ائتمان (قريباً)</option>
                        </select>
                    </div>

                    <br>
                    <button type="submit" class="btn-primary" style="width: 100%;">تأكيد الطلب</button>
                </form>
            </div>

            <!-- ملخص الطلب (Order Summary) -->
            <div style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: var(--shadow); height: fit-content;">
                <h3>ملخص الطلب</h3>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
                <div id="orderSummary">
                    <!-- سيتم تحميل ملخص الطلب هنا -->
                </div>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 18px;">
                    <span>الإجمالي:</span>
                    <span id="orderTotal">0 ر.س</span>
                </div>
            </div>
        </div>
    </section>

    <!-- الفوتر (Footer) -->
    <footer>
        <div class="container">
            <div class="copyright">
                &copy; 2026 جميع الحقوق محفوظة لمتجر  باريس للأثاث
            </div>
        </div>
    </footer>

    <!-- ملفات JavaScript -->
    <script src="js/products.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderOrderSummary();
            
            const form = document.getElementById('checkoutForm');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                if (validateForm()) {
                    processOrder();
                }
            });
        });

        function renderOrderSummary() {
            const cart = getCart();
            const summary = document.getElementById('orderSummary');
            const totalElement = document.getElementById('orderTotal');
            
            if (cart.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            let total = 0;
            summary.innerHTML = '';

            cart.forEach(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                
                const div = document.createElement('div');
                div.style.cssText = 'display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0;';
                div.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 6px;" tabindex="0">
                    <div style="flex: 1;">
                        <div style="font-weight: 700; font-size: 14px; color: var(--primary-color);" tabindex="0">${item.name}</div>
                        <div style="font-size: 12px; color: var(--text-muted);" tabindex="0">الكمية: ${item.quantity}</div>
                    </div>
                    <div style="font-weight: 800; color: #B12704; font-size: 14px;" tabindex="0">${subtotal.toLocaleString()} ر.س</div>
                `;
                summary.appendChild(div);
            });

            totalElement.textContent = `${total.toLocaleString()} ر.س`;
        }

        function validateForm() {
            let isValid = true;
            const name = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;

            // إعادة تعيين الأخطاء
            document.getElementById('nameError').style.display = 'none';
            document.getElementById('phoneError').style.display = 'none';
            document.getElementById('addressError').style.display = 'none';

            if (name.length < 3) {
                document.getElementById('nameError').style.display = 'block';
                isValid = false;
            }

            const phoneRegex = /^05\d{8}$/;
            if (!phoneRegex.test(phone)) {
                document.getElementById('phoneError').style.display = 'block';
                isValid = false;
            }

            if (address.length < 10) {
                document.getElementById('addressError').style.display = 'block';
                isValid = false;
            }

            return isValid;
        }

        function processOrder() {
            // محاكاة إرسال الطلب
            const cart = getCart();
            const orderId = Math.floor(Math.random() * 1000000);
            
            // مسح السلة
            localStorage.setItem('cart', JSON.stringify([]));
            
            // عرض رسالة نجاح
            document.querySelector('section.container').innerHTML = `
                <div style="text-align: center; padding: 60px; background: #fff; border-radius: 8px; box-shadow: var(--shadow);">
                    <div style="font-size: 60px; color: #4CAF50; margin-bottom: 20px;">✅</div>
                    <h2>تم استلام طلبك بنجاح!</h2>
                    <p>رقم الطلب الخاص بك هو: <strong>#${orderId}</strong></p>
                    <p>سنتواصل معك قريباً لتأكيد موعد التوصيل.</p>
                    <br>
                    <a href="index.html" class="btn-primary">العودة للرئيسية</a>
                </div>
            `;
            
            updateCartCount();
        }
    </script>
</body>
</html>
